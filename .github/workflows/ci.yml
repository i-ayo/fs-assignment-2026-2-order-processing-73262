name: CI — Build, Test & Coverage

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Job 1: Build, Test & Coverage ────────────────────────────────────────
  build-test:
    name: Build, Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # ── SportsStore MVC (book baseline) ──────────────────────────────────
      - name: Restore — SportsStore
        run: dotnet restore "11 - SportsStore - 5/End of Chapter/SportsSln/SportsSln.sln"

      - name: Build — SportsStore
        run: |
          dotnet build \
            "11 - SportsStore - 5/End of Chapter/SportsSln/SportsSln.sln" \
            --no-restore \
            --configuration Release

      - name: Test — SportsStore
        run: |
          dotnet test \
            "11 - SportsStore - 5/End of Chapter/SportsSln/SportsSln.sln" \
            --no-build \
            --configuration Release \
            --verbosity normal \
            --logger "trx;LogFileName=sportsstore-results.trx" \
            --logger "console;verbosity=detailed"

      # ── Distributed Order Processing System ──────────────────────────────
      - name: Restore — OrderProcessing
        run: |
          dotnet restore \
            "11 - SportsStore - 5/End of Chapter/OrderProcessing/OrderProcessing.sln"

      - name: Build — OrderProcessing
        run: |
          dotnet build \
            "11 - SportsStore - 5/End of Chapter/OrderProcessing/OrderProcessing.sln" \
            --no-restore \
            --configuration Release

      - name: Test — OrderProcessing (with XPlat coverage)
        run: |
          dotnet test \
            "11 - SportsStore - 5/End of Chapter/OrderProcessing/OrderProcessing.sln" \
            --no-build \
            --configuration Release \
            --verbosity normal \
            --logger "trx;LogFileName=orderprocessing-results.trx" \
            --logger "console;verbosity=detailed" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate HTML coverage report
        shell: bash
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          reportgenerator \
            -reports:"**/coverage.cobertura.xml" \
            -targetdir:"coveragereport" \
            -reporttypes:"Html;Cobertura;MarkdownSummary" \
            -title:"Order Processing — Coverage Report"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coveragereport

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages
          path: coveragereport

  # ── Job 2: Deploy Coverage → GitHub Pages ────────────────────────────────
  deploy:
    name: Deploy Coverage → GitHub Pages
    needs: build-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages
