# ─────────────────────────────────────────────────────────────────────────────
# CI — Build & Test
# Runs on every push to master and on every pull request targeting master.
# The workflow FAILS immediately if any test fails (dotnet test exits non-zero).
# Test results are published as TRX artifacts and surfaced in the PR check UI.
# ─────────────────────────────────────────────────────────────────────────────
name: CI — Build & Test

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  # ── Job 1: SportsStore MVC (book baseline) ───────────────────────────────
  sportsstore-build-test:
    name: SportsStore MVC — Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore "11 - SportsStore - 5/End of Chapter/SportsSln/SportsSln.sln"

      - name: Build
        run: |
          dotnet build \
            "11 - SportsStore - 5/End of Chapter/SportsSln/SportsSln.sln" \
            --no-restore \
            --configuration Release

      - name: Test
        run: |
          dotnet test \
            "11 - SportsStore - 5/End of Chapter/SportsSln/SportsSln.sln" \
            --no-build \
            --configuration Release \
            --verbosity normal \
            --logger "trx;LogFileName=sportsstore-results.trx" \
            --logger "console;verbosity=detailed"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sportsstore-test-results
          path: "**/*.trx"

  # ── Job 2: Distributed Order Processing System ───────────────────────────
  orderprocessing-build-test:
    name: OrderProcessing — Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: |
          dotnet restore \
            "11 - SportsStore - 5/End of Chapter/OrderProcessing/OrderProcessing.sln"

      - name: Build
        run: |
          dotnet build \
            "11 - SportsStore - 5/End of Chapter/OrderProcessing/OrderProcessing.sln" \
            --no-restore \
            --configuration Release

      - name: Test (with coverage)
        run: |
          dotnet test \
            "11 - SportsStore - 5/End of Chapter/OrderProcessing/OrderProcessing.sln" \
            --no-build \
            --configuration Release \
            --verbosity normal \
            --logger "trx;LogFileName=orderprocessing-results.trx" \
            --logger "console;verbosity=detailed" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults

      - name: Upload test results & coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: orderprocessing-test-results
          path: |
            **/*.trx
            TestResults/**/coverage.cobertura.xml

      - name: Publish test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: "Order Processing — Test Report"
          path: "**/*orderprocessing-results.trx"
          reporter: dotnet-trx
          fail-on-error: true
